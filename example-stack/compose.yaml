---
x-default-logging: &logging
 driver: "fluentd"
 options:
   fluentd-address: "localhost:24224"
   fluentd-async: "true"
   fluentd-retry-wait: 1s
   fluentd-max-retries: 10
services:
  prom-pushgateway:
    image: prom/pushgateway
    ports: 
      - 9091:9091
  prometheus:
    container_name: prometheus
    image: prom/prometheus:v3.12.0 # hard coded to 3.12 as 'latest' pointed to 2.5.4, which doesn't accept storage.tsdb within prometheus.yml
    command:
      - --config.file=/etc/prometheus/prometheus.yml # Retain CMD
      - --storage.tsdb.path=/prometheus              # Retain CMD
      - --web.enable-remote-write-receiver           # Custom
    ports:
      - 9090:9090
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
  influxdb:
    container_name: influxdb2
    image: influxdb:2
    ports:
      - 8086:8086
    restart: unless-stopped
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=my-user
      - DOCKER_INFLUXDB_INIT_PASSWORD=my-password
      - DOCKER_INFLUXDB_INIT_ORG=my-org
      - DOCKER_INFLUXDB_INIT_BUCKET=my-bucket
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=my-super-secret-auth-token
    volumes:
      - influxdb_data:/var/lib/influxdb2
  grafana:
    container_name: grafana
    image: grafana/grafana
    ports:
      - 3000:3000
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=grafana
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards:/var/lib/grafana/dashboards
  loki:
    container_name: loki
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    volumes:
      - ./loki/local-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
  otel-collector:
    container_name: otel-collector
    image: otel/opentelemetry-collector-contrib
    restart: unless-stopped
    volumes:
      - ./otelcol-contrib/config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    ports:
      - "24224:24224"   # Fluent_forward receiver
  prometheus-exporter-weather:
    container_name: prometheus-exporter-weather
    build:
      context: ..
      dockerfile: prometheus-exporter-weather/Dockerfile
    env_file: ../prometheus-exporter-weather/locations.env
    ports:
      - 2112:2112
    restart: unless-stopped
    logging: *logging
  logger-speedrun:
    container_name: logger-speedrun
    build:
      context: ..
      dockerfile: logger-speedrun/Dockerfile
    env_file: ../logger-speedrun/leaderboards.env
    restart: on-failure
    logging: *logging
    command: # arguments to entrypoint
    - -nocron # emulating cron
    - '1440' # runs in a loop, sleeping for 1 day (60*24 mins)
    depends_on:
      - loki
  replicator-chess:
    container_name: replicator-chess
    build:
      context: ..
      dockerfile: replicator-chess/Dockerfile
    env_file: ../replicator-chess/players.env
    restart: on-failure
    logging: *logging
    command: # arguments to entrypoint
    - -nocron # emulating cron
    - '1440' # runs in a loop, sleeping for 1 day (60*24 mins)
    - -dbhost
    - 'influxdb'
    depends_on:
      - influxdb
volumes:
  prometheus_data:
  loki_data:
  influxdb_data: