receivers:
  fluent_forward:
    endpoint: 0.0.0.0:24224
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  prometheus:
    config:
      scrape_configs:
        - job_name: weather
          scrape_interval: 60s
          scrape_timeout: 10s
          static_configs:
            - targets:
                - prometheus-exporter-weather:2112
exporters:
  debug:
    verbosity: detailed
  otlp_http:
    endpoint: http://loki:3100/otlp
  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write
service:
  pipelines:
    logs:
      receivers:
        - fluent_forward
      exporters:
        - otlp_http
    metrics:
      receivers:
        - prometheus
        - otlp
      exporters:
        - prometheusremotewrite
